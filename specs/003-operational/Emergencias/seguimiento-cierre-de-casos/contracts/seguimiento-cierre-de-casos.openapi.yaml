    HistorialEmergenciasResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          $ref: '#/components/schemas/HistorialEmergenciasData'
        meta:
          $ref: '#/components/schemas/EnvelopeMeta'

    ExpedienteData:
      type: object
