[pytest]
DJANGO_SETTINGS_MODULE = config.settings
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
testpaths = apps
addopts = -ra --strict-markers
markers =
    unit: Tests rápidos sin dependencias externas
    repository: Tests de repositorio con Pinot/Kafka mockeados
    service: Tests de servicios con repos mockeados
    api: Tests de endpoints REST con DRF TestClient
    integration: Tests con Pinot/Kafka reales
    slow: Tests que requieren más de 1s de ejecución
    critical_path: Tests de la cadena crítica de registro/despacho
