server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        client_max_body_size 50m;
        proxy_pass http://django:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html must always be revalidated so the browser picks up new
    # content-hashed chunk filenames after every deploy; otherwise a stale
    # cached index.html references chunks that no longer exist post-rebuild.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Content-hashed build artifacts (main-*.js, chunk-*.js, styles-*.css)
    # are safe to cache aggressively since their filename changes whenever
    # their content does.
    location ~* \.(js|css)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
